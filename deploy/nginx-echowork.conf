# /etc/nginx/sites-available/echowork
# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name echowork.net www.echowork.net;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://www.echowork.net$request_uri;
    }
}

# Redirect non-www HTTPS → www
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name echowork.net;

    ssl_certificate     /etc/letsencrypt/live/echowork.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/echowork.net/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://www.echowork.net$request_uri;
}

# Main server block
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.echowork.net;

    ssl_certificate     /etc/letsencrypt/live/echowork.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/echowork.net/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/echowork/dist;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # Proxy API requests to NestJS backend
    location /api/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Static assets — long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — all routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
